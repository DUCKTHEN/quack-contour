<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Quack Contour is a browser OBJ avatar contour and body-section preview tool.">
  <title>Quack Contour</title>
  <link rel="icon" href="assets/IconAhiru.png">
  <link rel="apple-touch-icon" href="assets/IconAhiru.png">
  <link rel="stylesheet" href="web/styles.css">
</head>
<body>
  <header class="app-header">
    <button class="brand" id="reset-view" type="button" title="表示をリセット">
      <img src="assets/IconAhiru.png" alt="" class="brand-icon">
      <span>
        <strong>Quack Contour</strong>
        <small>OBJ body contour tool</small>
      </span>
    </button>
    <div class="support-card" aria-live="polite">
      <img src="assets/IconAhiru.png" alt="" class="support-icon">
      <span id="support-text">OBJを読み込んで、体型シルエットと断面の見え方を確認できます。</span>
    </div>
    <nav class="top-actions" aria-label="primary actions">
      <a class="ghost-button" href="https://github.com/DUCKTHEN/quack-contour">GitHub</a>
      <a class="ghost-button" href="README.md">README</a>
    </nav>
  </header>

  <main class="app-shell">
    <aside class="panel left-panel" aria-label="controls">
      <div class="action-grid">
        <label class="file-button primary">
          主OBJインポート
          <input id="primary-file" type="file" accept=".obj,text/plain">
        </label>
        <label class="file-button">
          比較OBJインポート
          <input id="compare-file" type="file" accept=".obj,text/plain">
        </label>
      </div>

      <section class="control-section">
        <h2>表示</h2>
        <label class="check-row"><input id="show-primary" type="checkbox" checked>主モデルを表示</label>
        <label class="check-row"><input id="show-compare" type="checkbox" checked>比較モデルを表示</label>
        <label class="check-row"><input id="show-guides" type="checkbox" checked>断面ガイドを表示</label>
        <label class="check-row"><input id="show-grid" type="checkbox" checked>床グリッドを表示</label>
        <label class="check-row"><input id="orthographic" type="checkbox" checked>平行投影</label>
      </section>

      <section class="control-section">
        <h2>モデル</h2>
        <label class="field-row">主モデル色<input id="primary-color" type="color" value="#202020"></label>
        <label class="field-row">比較色<input id="compare-color" type="color" value="#9aa3aa"></label>
        <label class="slider-row">主モデル濃さ<input id="primary-opacity" type="range" min="5" max="100" value="100"><span id="primary-opacity-value">100%</span></label>
        <label class="slider-row">比較濃さ<input id="compare-opacity" type="range" min="5" max="100" value="100"><span id="compare-opacity-value">100%</span></label>
      </section>

      <section class="control-section">
        <h2>比較</h2>
        <label class="field-row">比較配置
          <select id="layout-mode">
            <option value="side">並べる</option>
            <option value="overlay">重ねる</option>
          </select>
        </label>
        <button id="fit-view" type="button" class="wide-button">画面に合わせる</button>
      </section>

      <section class="control-section muted-section">
        <h2>ローカル版</h2>
        <p>断面編集、上面図PNG/JSON、下絵、落書き、マスクはローカルPython版で開発中です。</p>
      </section>
    </aside>

    <section class="viewer-wrap" aria-label="3D preview">
      <canvas id="viewer"></canvas>
      <div class="view-toolbar" aria-label="view toggles">
        <button id="fit-view-floating" type="button" title="画面に合わせる">⛶</button>
        <button id="grid-floating" type="button" title="床グリッド">#</button>
        <button id="camera-floating" type="button" title="平行投影 / パース">▣</button>
      </div>
      <div id="drop-hint" class="drop-hint">OBJファイルをここへドラッグできます</div>
    </section>

    <aside class="panel right-panel" aria-label="diagnostics">
      <section>
        <h2>読み込みファイル</h2>
        <div class="file-name" id="primary-name">主モデル: --</div>
        <div class="file-name" id="compare-name">比較モデル: --</div>
      </section>
      <section>
        <h2>モデル診断</h2>
        <p class="hint">頂点数、面数、推定サイズ、重さの注意を確認できます。品質や商用利用可否を判定するものではありません。</p>
        <div id="diagnostics" class="diagnostics-list"></div>
      </section>
      <section>
        <h2>Web版の範囲</h2>
        <p class="hint">このページはGitHub Pages用の軽量プレビューです。モデルはブラウザ内で読み込み、サーバーへ送信しません。</p>
      </section>
    </aside>
  </main>

  <script src="vendor/three.min.js"></script>
  <script src="web/app.js"></script>
</body>
</html>
